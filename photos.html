<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles3.css">
    <title>Photos - IOT Serres</title>
</head>

<body>
    <div class="container py-3">

        <!-- En-tête : logo + titre -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <img src="image/logo ppr.png" alt="logo ppr" class="logo">
            <span class="ciel-title">BTS CIEL</span>
        </header>

        <!-- Menu : la checkbox cachée est cochée/décochée par le label "Menus",
             ce qui affiche ou cache les liens via CSS (.menu-check:checked ~ .menu-nav) -->
        <div class="menu-wrapper mb-4">
            <input type="checkbox" id="menuCheck" class="menu-check">
            <label for="menuCheck" class="menu-btn">Menus</label>
            <nav class="menu-nav">
                <a class="menu-lien" href="index.html">Accueil</a>
                <a class="menu-lien" href="tableau.html">Tableau de bord</a>
                <a class="menu-lien" href="page de donner.html">Données</a>
                <a class="menu-lien" href="architecture.html">Architecture</a>
                <a class="menu-lien" href="photos.html">Vidéo</a>
            </nav>
        </div>

        <main>
            <h1 class="h3 mb-3">Les données de la serre</h1>
            <h2 class="h5">Dernières données</h2>

            <!-- 2 sections côte à côte grace a flexbox -->
            <div class="orange-bar mt-4">
                <div>Accueil</div>
                <div>Environnement</div>
            </div>

            <p class="subtitle mt-3">Les plus belles photos</p>

            <!-- 3 photos centrées dans des cadres de taille fixe-->
            <div class="row g-4 justify-content-center mt-2">
                <div class="col-auto">
                    <div class="photo-box">
                        <img src="image/photo1.png" class="img-fluid" alt="Photo 1">
                    </div>
                </div>
                <div class="col-auto">
                    <div class="photo-box">
                        <img src="image/Photo2.png" class="img-fluid" alt="Photo 2">
                    </div>
                </div>
                <div class="col-auto">
                    <div class="photo-box">
                        <img src="image/photo3.png" class="img-fluid" alt="Photo 3">
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <a href="index.html" class="btn btn-link">Revenir à l'accueil</a>
            </div>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
