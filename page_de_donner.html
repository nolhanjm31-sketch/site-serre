<!doctype html>
<html lang="fr">
<head>
    <title>IOT Serres - Données</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Feuille de style Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Notre propre feuille de style pour cette page -->
    <link rel="stylesheet" href="css/styles1.css">
</head>

<body>
    <div class="container py-3">
        
        <!-- En-tête : logo à gauche, titre à droite -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <img src="image/logo ppr.png" alt="Logo Lycée" class="logo">
            <span class="ciel-title">BTS CIEL</span>
        </header>

        <!--
            MENU DÉROULANT SANS JAVASCRIPT
            Fonctionnement :
            1. Une case à cocher (input checkbox) est cachée visuellement
            2. Le label "Menus" est cliquable et coche/décoche cette case
            3. En CSS : quand la case est cochée (.menu-check:checked),
               on affiche la nav (.menu-nav) avec display:flex
            Résultat : cliquer sur "Menus" affiche ou cache les liens
        -->
        <div class="menu-wrapper mb-4">
            <input type="checkbox" id="menuCheck" class="menu-check">
            <label for="menuCheck" class="menu-btn">Menus</label>

            <!-- Les liens de navigation, cachés par défaut -->
            <nav class="menu-nav">
                <a class="menu-lien" href="index.html">Accueil</a>
                <a class="menu-lien" href="tableau.html">Tableau de bord</a>
                <a class="menu-lien" href="page de donner.html">Données</a>
                <a class="menu-lien" href="architecture.html">Architecture</a>
                <a class="menu-lien" href="photos.html">Vidéo</a>
            </nav>
        </div>

        <main>
            <h1 class="h3 mb-3">Les données de la serre</h1>
            <h2 class="h5">Dernières données</h2>

            <!--
                Tableau des mesures
                - table-responsive : ajoute un scroll horizontal sur mobile
                - table-bordered : bordures sur les cellules
                - text-center align-middle : contenu centré horizontalement et verticalement
                - Les classes gray-row / light-gray-row alternent la couleur des lignes (définies dans styles1.css)
            -->
            <div class="table-responsive mt-3">
                <table class="table table-bordered custom-data-table text-center align-middle">
                    <thead>
                        <tr>
                            <!-- En-têtes avec fond bleu et icônes -->
                            <th class="blue-header">-</th>
                            <th class="blue-header"><img src="image/icone-humidite.png" alt="Humidité" class="icon-img"></th>
                            <th class="blue-header"><img src="image/icone-temperature (1).png" alt="Température" class="icon-img"></th>
                            <th class="blue-header"><img src="image/icone-pression (1).png" alt="Pression" class="icon-img"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Lignes alternées gris foncé / gris clair -->
                        <tr class="gray-row">
                            <td>25/03/2024 10:15</td>
                            <td>70%</td>
                            <td>23°C</td>
                            <td>900hPa</td>
                        </tr>
                        <tr class="light-gray-row">
                            <td>25/03/2024 10:00</td>
                            <td>...</td>
                            <td>...</td>
                            <td>...</td>
                        </tr>
                        <tr class="gray-row">
                            <td>25/03/2024 09:45</td>
                            <td>...</td>
                            <td>...</td>
                            <td>...</td>
                        </tr>
                        <tr class="light-gray-row">
                            <td>25/03/2024 09:30</td>
                            <td>...</td>
                            <td>...</td>
                            <td>...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Liens de navigation en bas de page -->
            <div class="footer-nav mt-4">
                <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=PLrXk_RHmNdhHW95zl63D6IhFn9OW5Ia1N&index=2" class="btn btn-link">lien de confiance</a>
                <p><a href="index.html" class="btn btn-link">Revenir à l'accueil</a></p>
            </div>
        </main>
    </div>

    <!-- Script Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
